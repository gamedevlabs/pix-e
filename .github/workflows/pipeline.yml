on: [ push ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  frontend:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint with ESLint
        run: npm run lint-check
      - name: Check Prettier formatting
        run: npm run format-check
      - name: Build the Nuxt app
        run: npm run build

  backend:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install lint/typecheck tools only
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m black --version
          python -m isort --version
          python -m flake8 --version
          python -m mypy --version
      - name: Run Black
        run: python -m black --check .
      - name: Run isort
        run: python -m isort --check-only .
      - name: Run Flake8
        run: python -m flake8 .
      - name: Run mypy
        run: python -m mypy .
      - name: Run django migration checks
        env:
          DJANGO_SETTINGS_MODULE: api.settings
          SECRET_KEY: dummy
          SQLITE_DB_PATH: db.sqlite3
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
      - name: Run test suite
        run: python -m pytest llm/tests/ pillars/tests/ -v

  deploy:
    needs: [detect-changes, frontend, backend]
    if: always() && needs.detect-changes.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [ frontend, backend ]
    steps:
      - name: Checkout code
        if: needs[matrix.component].result == 'success'
        uses: actions/checkout@v4
      - name: Login to GHCR
        if: needs[matrix.component].result == 'success'
        uses: docker/login-action@v4
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker Meta
        if: needs[matrix.component].result == 'success'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=ref,event=pr
      - name: Build and push
        if: needs[matrix.component].result == 'success'
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CADDY_CONFIG=${{ github.ref_name == 'release' && 'prod.Caddyfile' || 'dev.Caddyfile' }}
      #- name: Deploy to Dev
      #  if: github.ref_name == 'main'
      #  run: |
      #    echo "Deploying to Dev"
      #- name: Deploy to Release
      #  if: github.ref_name == 'release'
      #  run: |
      #    echo "Deploying to Release"